<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ FRANKLIN FOOTBALL · ESPORTS</title>
  <!-- ✅ Official @colyseus/sdk 0.17 -->
  <script src="https://unpkg.com/@colyseus/sdk@0.17.42/dist/colyseus.js"></script>
  <!-- ✅ Embedded Schema & MapSchema -->
  <script>
    (function() {
      class Schema {
        constructor() {
          if (this.constructor._schema) {
            const schema = this.constructor._schema;
            for (const key in schema) {
              const type = schema[key];
              if (type === 'number') this[key] = 0;
              else if (type === 'string') this[key] = '';
              else if (type === 'boolean') this[key] = false;
              else if (typeof type === 'object') {
                if (type.map) this[key] = new MapSchema();
                else if (typeof type === 'function') this[key] = new type();
                else this[key] = undefined;
              } else {
                this[key] = undefined;
              }
            }
          }
        }
      }
      class MapSchema {
        constructor() { this._map = new Map(); }
        forEach(cb) { this._map.forEach((v,k) => cb(v,k)); }
        get(k) { return this._map.get(k); }
        set(k,v) { this._map.set(k,v); }
        get size() { return this._map.size; }
        values() { return this._map.values(); }
      }
      window.Schema = Schema;
      window.MapSchema = MapSchema;
    })();
  </script>
  <style>
    /* … (your full CSS, unchanged) … */
  </style>
</head>
<body>
<!-- … (your full HTML structure, unchanged, with copy buttons and chat area as you pasted) … -->

<script>
  // ==================== CLIENT SCHEMA DEFINITIONS (Embedded) ====================
  class PlayerState extends Schema {
    constructor() {
      super();
      this.x = 150; this.y = 415; this.vx = 0; this.vy = 0;
      this.isJumping = false; this.color = "#ff00ff"; this.side = "left";
      this.name = ""; this.ready = false; this.accelX = 0;
      this.reconnecting = false; this.disconnectTime = 0;
    }
  }
  PlayerState._schema = {
    x: "number", y: "number", vx: "number", vy: "number",
    isJumping: "boolean", color: "string", side: "string",
    name: "string", ready: "boolean", accelX: "number",
    reconnecting: "boolean", disconnectTime: "number"
  };

  class BallState extends Schema {
    constructor() { super(); this.x = 500; this.y = 250; this.vx = 5; this.vy = -3; }
  }
  BallState._schema = { x: "number", y: "number", vx: "number", vy: "number" };

  class KeeperState extends Schema {
    constructor() { super(); this.y = 250; this.vy = 0; }
  }
  KeeperState._schema = { y: "number", vy: "number" };

  class GameState extends Schema {
    constructor() {
      super();
      this.players = new MapSchema();
      this.ball = new BallState();
      this.keeper1 = new KeeperState();
      this.keeper2 = new KeeperState();
      this.p1Score = 0; this.p2Score = 0; this.timeLeft = 120;
      this.gameOver = false; this.winnerMessage = "";
      this.matchState = "waiting"; this.hostId = ""; this.roomCode = "";
      this.countdown = -1; this.goalFreeze = 0;
      this.password = ""; this.lastWinner = "";
    }
  }
  GameState._schema = {
    players: { map: PlayerState },
    ball: BallState, keeper1: KeeperState, keeper2: KeeperState,
    p1Score: "number", p2Score: "number", timeLeft: "number",
    gameOver: "boolean", winnerMessage: "string",
    matchState: "string", hostId: "string", roomCode: "string",
    countdown: "number", goalFreeze: "number",
    password: "string", lastWinner: "string"
  };

  // ==================== CONFIG ====================
  const SERVER_URL = "wss://football-server1.onrender.com";
  
  // ==================== GLOBAL STATE ====================
  let client, room, myPlayerId, amIHost, gameActive = false;
  let keys = {};
  let lastInputStr, serverState, localPlayer, remotePlayer;
  let predictedX, predictedY, predictedVx, predictedVy;
  let ping = 0, reconnectAttempts = 0;
  let goalFreeze = false, countdownValue = -1, matchStatus = "waiting";
  let inputInterval, pingInterval;
  let roomPassword = "";
  let selectedRegion = "europe";

  // Mobile touch state
  let touchDir = { up: false, down: false, left: false, right: false };
  let shootPressed = false, turboPressed = false, aimMode = false;
  let aimStartX = 0, aimStartY = 0;

  // UI Elements
  const panels = {
    start: document.getElementById('startPanel'), menu: document.getElementById('menuPanel'),
    lobby: document.getElementById('lobbyPanel'), game: document.getElementById('gamePanel')
  };
  const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
  const goalHorn = document.getElementById('goalHorn');
  const commentaryDiv = document.getElementById('commentary'), goalBanner = document.getElementById('goalBanner');
  const warningDiv = document.getElementById('warning'), winnerMsgDiv = document.getElementById('winnerMsg');
  const pingEl = document.getElementById('pingDisplay'), statusBar = document.getElementById('statusBar');
  const countdownEl = document.getElementById('countdownOverlay');
  const rematchBtn = document.getElementById('rematchBtn');
  const passwordDisplay = document.getElementById('passwordDisplay'), passwordText = document.getElementById('passwordText');
  const reconnectOverlay = document.getElementById('reconnectOverlay');
  const regionSelect = document.getElementById('regionSelect');
  const mobileControls = document.getElementById('mobileControls');
  const aimIndicator = document.getElementById('aimIndicator');
  const chatMessages = document.getElementById('chatMessages');

  // 🎵 Music Playlist
  const playlist = ['/1.mp3', '/3.mp3', '/4.mp3', '/5.mp3'];
  let currentTrack = 0;
  const bgMusic = document.getElementById('bgMusic');
  bgMusic.volume = 0.6;

  function playNextTrack() {
    if (!gameActive) return;
    bgMusic.src = playlist[currentTrack];
    bgMusic.play().catch(() => {});
    currentTrack = (currentTrack + 1) % playlist.length;
  }
  bgMusic.addEventListener('ended', playNextTrack);

  function comment(msg, c = "#ffcc00") {
    commentaryDiv.innerText = msg;
    commentaryDiv.style.color = c;
    commentaryDiv.classList.add('show');
    setTimeout(() => commentaryDiv.classList.remove('show'), 2000);
  }
  function goalAnimation(color) {
    goalBanner.style.textShadow = `0 0 30px ${color},0 0 60px ${color}`;
    goalBanner.classList.add('show');
    setTimeout(() => goalBanner.classList.remove('show'), 1500);
  }
  function sendEmote(emoji) { if (room) room.send("emote", emoji); }
  function sendRematch() { if (room) { room.send("rematch"); rematchBtn.classList.add('hidden'); } }
  regionSelect.addEventListener('change', () => { selectedRegion = regionSelect.value; });

  // ==================== COPY BUTTONS ====================
  document.getElementById('copyRoomCode').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('roomCodeDisplay').innerText);
  };
  document.getElementById('copyPassword').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('passwordText').innerText);
  };

  // ==================== MOBILE CONTROLS SETUP ====================
  function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }

  function showMobileControls() {
    if (isMobile()) mobileControls.style.display = 'flex';
  }

  function setupDpad() {
    const btnUp = document.getElementById('btnUp');
    const btnDown = document.getElementById('btnDown');
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');

    function setTouchDir(dir, val) { touchDir[dir] = val; }
    btnUp.addEventListener('touchstart', e => { e.preventDefault(); setTouchDir('up', true); });
    btnUp.addEventListener('touchend', e => { e.preventDefault(); setTouchDir('up', false); });
    btnDown.addEventListener('touchstart', e => { e.preventDefault(); setTouchDir('down', true); });
    btnDown.addEventListener('touchend', e => { e.preventDefault(); setTouchDir('down', false); });
    btnLeft.addEventListener('touchstart', e => { e.preventDefault(); setTouchDir('left', true); });
    btnLeft.addEventListener('touchend', e => { e.preventDefault(); setTouchDir('left', false); });
    btnRight.addEventListener('touchstart', e => { e.preventDefault(); setTouchDir('right', true); });
    btnRight.addEventListener('touchend', e => { e.preventDefault(); setTouchDir('right', false); });
  }

  function setupActionButtons() {
    const shootBtn = document.getElementById('shootBtn');
    const turboBtn = document.getElementById('turboBtn');

    shootBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      aimMode = true;
      shootPressed = true;
      const touch = e.touches[0];
      aimStartX = touch.clientX; aimStartY = touch.clientY;
      aimIndicator.style.display = 'block';
    });
    shootBtn.addEventListener('touchmove', e => {
      if (!aimMode) return;
      e.preventDefault();
      const touch = e.touches[0];
      aimIndicator.style.left = (aimStartX - 25) + 'px';
      aimIndicator.style.top = (aimStartY - 25) + 'px';
      aimIndicator.style.width = '50px'; aimIndicator.style.height = '50px';
    });
    shootBtn.addEventListener('touchend', e => {
      e.preventDefault();
      aimMode = false; shootPressed = false;
      aimIndicator.style.display = 'none';
    });

    turboBtn.addEventListener('touchstart', e => { e.preventDefault(); turboPressed = true; });
    turboBtn.addEventListener('touchend', e => { e.preventDefault(); turboPressed = false; });
  }

  function getTouchInput() {
    return {
      left: touchDir.left,
      right: touchDir.right,
      up: touchDir.up,
      down: touchDir.down,
      shoot: shootPressed,
      turbo: turboPressed,
    };
  }

  // Keyboard input
  window.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable;
    if (!isInput) e.preventDefault();
    keys[e.code] = true;
  });
  window.addEventListener('keyup', e => {
    const tag = e.target.tagName;
    const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable;
    if (!isInput) e.preventDefault();
    keys[e.code] = false;
  });

  // ==================== INPUT COMBINATION ====================
  function getInput() {
    const touch = getTouchInput();
    if (myPlayerId === 'p1') {
      return {
        left: keys['KeyA'] || touch.left,
        right: keys['KeyD'] || touch.right,
        up: keys['KeyW'] || touch.up,
        down: keys['KeyS'] || touch.down,
        shoot: keys['Digit1'] || touch.shoot,
        turbo: (keys['KeyW'] && keys['Digit1']) || touch.turbo
      };
    } else {
      return {
        left: keys['ArrowLeft'] || touch.left,
        right: keys['ArrowRight'] || touch.right,
        up: keys['ArrowUp'] || touch.up,
        down: keys['ArrowDown'] || touch.down,
        shoot: keys['ArrowUp'] || touch.shoot,
        turbo: (keys['ArrowUp'] && (keys['ArrowLeft'] || keys['ArrowRight'])) || touch.turbo
      };
    }
  }

  // ==================== NETWORKING ====================
  async function createRoom() {
    const hostName = await showPrompt("Enter your display name", "Your name");
    if (!hostName) return;
    const password = await showPrompt("Set a room password", "Leave empty for random", true);
    if (password === null) return;
    const pass = password || Math.random().toString(36).substr(2,6);
    selectedRegion = regionSelect.value;
    client = new Colyseus.Client(SERVER_URL);
    try {
      room = await client.create("football", { password: pass, region: selectedRegion });
      amIHost = true; myPlayerId = 'p1'; roomPassword = pass;
      room.send("setName", hostName);
    } catch(e) {
      alert("Failed to create room. Is server running? " + e.message);
      return;
    }
    setupRoom(); enterLobby();
    passwordDisplay.style.display = 'flex'; passwordText.innerText = pass;
  }

  async function joinRoom() {
    const code = document.getElementById('roomCodeInput').value.trim();
    const pass = document.getElementById('passwordInput').value.trim();
    if (!code) return;
    client = new Colyseus.Client(SERVER_URL);
    try {
      room = await client.joinById(code, { password: pass });
      amIHost = false; myPlayerId = 'p2';
      const name = prompt("Enter your display name:", "Player2");
      room.send("setName", name || "P2");
    } catch(e) {
      alert("Invalid room code or password. " + e.message);
      return;
    }
    setupRoom(); enterLobby();
    passwordDisplay.style.display = 'none';
  }

  function setupRoom() {
    if (room._handlersSet) return; room._handlersSet = true;

    // ========== CLEAR CHAT ON JOIN ==========
    chatMessages.innerHTML = '<div>💬 Welcome! Chat here with your opponent.</div>';

    // Show room code immediately
    serverState = room.state;
    document.getElementById('roomCodeDisplay').innerText = serverState.roomCode || room.roomId;

    // ========== MESSAGE LISTENERS ==========
    room.onMessage("playerNames", data => {
      document.getElementById('p1Name').innerText = data.p1; document.getElementById('p2Name').innerText = data.p2;
      document.getElementById('p1ReadyBadge').className = `ready-badge ${data.p1Ready?'ready':''}`; document.getElementById('p1ReadyBadge').innerText = data.p1Ready?'✅ READY':'⚪ NOT READY';
      document.getElementById('p2ReadyBadge').className = `ready-badge ${data.p2Ready?'ready':''}`; document.getElementById('p2ReadyBadge').innerText = data.p2Ready?'✅ READY':'⚪ NOT READY';
      if (data.password && amIHost) { passwordText.innerText = data.password; }
      document.getElementById('connectionStatus').innerText = '⚡ connected';
    });

    room.onMessage("gameStarted", () => {
      panels.lobby.classList.add('hidden'); panels.game.classList.remove('hidden');
      gameActive = true; rematchBtn.classList.add('hidden');
      playNextTrack(); showMobileControls();
      predictedX = 150; predictedY = 415; predictedVx = 0; predictedVy = 0;
      statusBar.innerText = '🟢 LIVE';
    });

    room.onMessage("countdown", data => {
      countdownValue = data.value;
      if (countdownValue > 0) { countdownEl.style.display='block'; countdownEl.innerText = countdownValue; }
      else { countdownEl.innerText = 'GO!'; setTimeout(()=>countdownEl.style.display='none',500); }
    });

    room.onMessage("event", ev => {
      if (ev.type === "GOAL") {
        goalAnimation(ev.data.color); goalHorn.currentTime=0; goalHorn.play().catch(()=>{});
        comment(ev.data.scorer==='p1'?"GOAL! PLAYER 1 SCORES!":"GOAL! PLAYER 2 SCORES!",ev.data.color);
        document.getElementById('app').classList.add('shake'); setTimeout(()=>document.getElementById('app').classList.remove('shake'),500);
        goalFreeze = true;
      } else if (ev.type === "SHOT") comment(ev.data.turbo?"TURBO SHOT!":"POWER SHOT!",ev.data.color);
      else if (ev.type === "MUSIC_NEXT") playNextTrack();
      else if (ev.type === "FREEZE_END") goalFreeze = false;
    });

    // ========== CHAT & EMOTE WITH AUTO-SCROLL & NOTIFICATION ==========
    room.onMessage("chat", msg => {
      const div = document.createElement('div');
      div.innerHTML = `<span class="msg-sender">${msg.sender}:</span><span class="msg-text">${msg.text}</span>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      chatMessages.classList.add('sent-flash');
      setTimeout(() => chatMessages.classList.remove('sent-flash'), 400);
      showNotification(`💬 ${msg.sender} says: ${msg.text}`);
    });

    room.onMessage("emote", data => {
      const div = document.createElement('div');
      div.innerHTML = `<span class="msg-emote">${data.playerName} ${data.emoteId}</span>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      chatMessages.classList.add('sent-flash');
      setTimeout(() => chatMessages.classList.remove('sent-flash'), 400);
      showNotification(`😀 ${data.playerName} ${data.emoteId}`);
    });

    room.onMessage("opponentReconnecting", () => { reconnectOverlay.style.display = 'flex'; });
    room.onMessage("playerReconnected", () => { reconnectOverlay.style.display = 'none'; });
    room.onMessage("playerLeft", () => { alert("Opponent left."); leaveRoom(); });
    room.onMessage("rematch", () => {
      panels.game.classList.add('hidden'); panels.lobby.classList.remove('hidden');
      gameActive = false; rematchBtn.classList.add('hidden');
      winnerMsgDiv.style.display = 'none'; warningDiv.style.display = 'none';
      statusBar.innerText = '⚪ WAITING';
      if (inputInterval) clearInterval(inputInterval); if (pingInterval) clearInterval(pingInterval);
      inputInterval = pingInterval = null;
    });
    room.onMessage("error", msg => { alert(msg.message); });

    room.onStateChange(state => {
      serverState = state;
      document.getElementById('roomCodeDisplay').innerText = state.roomCode || room.roomId;
      matchStatus = state.matchState;
      statusBar.innerText = {"waiting":"⚪ WAITING","ready_check":"🟡 READY CHECK","countdown":"🟡 COUNTDOWN","live":"🟢 LIVE","end":"🔴 END"}[matchStatus]||matchStatus;
      if (state.gameOver) {
        gameActive = false;
        winnerMsgDiv.innerText = state.winnerMessage;
        winnerMsgDiv.style.display = 'block';
        rematchBtn.classList.remove('hidden');
      }
      warningDiv.style.display = state.timeLeft<=120?'block':'none';
      if (!gameActive) return;
      state.players.forEach((p,sid)=>{ if(sid===room.sessionId) localPlayer=p; else remotePlayer=p; });
      document.getElementById('p1Score').innerText = state.p1Score; document.getElementById('p2Score').innerText = state.p2Score;

      if (localPlayer) {
        if (!predictedX) { predictedX = localPlayer.x; predictedY = localPlayer.y; }
        const dx = localPlayer.x - predictedX, dy = localPlayer.y - predictedY;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) { predictedX += dx*0.3; predictedY += dy*0.3; }
        else { predictedX = localPlayer.x; predictedY = localPlayer.y; }
        predictedVx = localPlayer.vx; predictedVy = localPlayer.vy;
      }
    });
    room.onError(() => handleDisconnect());
    room.onLeave(() => { if (gameActive) handleDisconnect(); });

    inputInterval = setInterval(() => {
      if (!room || !gameActive) return;
      const inp = getInput();
      const str = JSON.stringify(inp);
      if (str !== lastInputStr) { room.send("move", inp); lastInputStr = str; }
    }, 33);
    pingInterval = setInterval(() => { if (room) room.send("ping", Date.now()); }, 2000);
    room.onMessage("pong", clientTime => { ping = Date.now() - clientTime; pingEl.innerText = `Ping: ${ping}ms`; reconnectAttempts = 0; });
  }

  function enterLobby() {
    panels.menu.classList.add('hidden'); panels.lobby.classList.remove('hidden');
  }

  function handleDisconnect() {
    if (reconnectAttempts < 1) {
      console.warn("Connection lost. The SDK will try to reconnect automatically.");
      reconnectAttempts++;
    } else {
      alert("Connection lost permanently. Please refresh the page.");
      leaveRoom();
    }
  }

  // ========== SMALL TOAST NOTIFICATION ==========
  function showNotification(text) {
    const toast = document.createElement('div');
    toast.innerText = text;
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.background = 'rgba(0,0,0,0.8)';
    toast.style.color = '#00ff00';
    toast.style.padding = '10px 25px';
    toast.style.borderRadius = '30px';
    toast.style.zIndex = '500';
    toast.style.fontWeight = 'bold';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // ==================== PREDICTION & RENDERING ====================
  function applyPrediction() {
    if (!gameActive || !localPlayer) return;
    const inp = getInput();
    const accel = 0.6;
    if (inp.left) predictedVx -= accel; if (inp.right) predictedVx += accel;
    if (!inp.left && !inp.right) predictedVx *= 0.85;
    predictedVx = Math.min(Math.max(predictedVx, -3), 3);
    if (inp.up && !(predictedY >= 415)) predictedVy = -14;
    if (inp.down) predictedVy += 1;
    predictedVy += 0.7; predictedX += predictedVx; predictedY += predictedVy;
    predictedVx *= 0.9;
    if (predictedY > 415) { predictedY = 415; predictedVy = 0; }
    predictedX = Math.min(930, Math.max(40, predictedX));
  }

  let prevBallX, prevBallY;
  function draw() {
    ctx.clearRect(0,0,1000,500);
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.strokeRect(0,150,40,200); ctx.strokeRect(960,150,40,200);
    ctx.beginPath(); ctx.moveTo(500,0); ctx.lineTo(500,500); ctx.stroke();

    if (serverState && serverState.ball) {
      const ball = serverState.ball;
      if (prevBallX === undefined) { prevBallX = ball.x; prevBallY = ball.y; }
      prevBallX += (ball.x - prevBallX) * 0.4; prevBallY += (ball.y - prevBallY) * 0.4;
      ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(prevBallX, prevBallY, 10, 0, Math.PI*2); ctx.fill();
      if (localPlayer) { ctx.fillStyle = localPlayer.color; ctx.fillRect(predictedX, predictedY, 30, 65); }
      if (remotePlayer) {
        if (!remotePlayer._dx) { remotePlayer._dx = remotePlayer.x; remotePlayer._dy = remotePlayer.y; }
        remotePlayer._dx += (remotePlayer.x - remotePlayer._dx) * 0.4; remotePlayer._dy += (remotePlayer.y - remotePlayer._dy) * 0.4;
        ctx.fillStyle = remotePlayer.color; ctx.fillRect(remotePlayer._dx, remotePlayer._dy, 30, 65);
      }
      ctx.fillStyle = "#ff00ff"; ctx.fillRect(5, serverState.keeper1.y, 12, 60);
      ctx.fillStyle = "#00f2ff"; ctx.fillRect(983, serverState.keeper2.y, 12, 60);
    }
  }
  function loop() { if (gameActive) applyPrediction(); draw(); requestAnimationFrame(loop); }
  loop();

  // ==================== UI EVENTS ====================
  function showPrompt(title, placeholder, isPassword=false) {
    return new Promise(resolve => {
      const overlay = document.createElement('div'); overlay.className='modal-overlay';
      overlay.innerHTML = `<div class="modal-box"><h2>${title}</h2><input type="${isPassword?'password':'text'}" id="modalInput" class="input-field" placeholder="${placeholder}"><div><button class="btn" id="modalConfirm">Confirm</button><button class="btn secondary" id="modalCancel">Cancel</button></div></div>`;
      document.body.appendChild(overlay);
      document.getElementById('modalConfirm').onclick = () => { const val = document.getElementById('modalInput').value; document.body.removeChild(overlay); resolve(val); };
      document.getElementById('modalCancel').onclick = () => { document.body.removeChild(overlay); resolve(null); };
    });
  }

  document.getElementById('startBtn').onclick = () => { panels.start.classList.add('hidden'); panels.menu.classList.remove('hidden'); bgMusic.play().catch(()=>{}); };
  document.getElementById('createRoomBtn').onclick = createRoom;
  document.getElementById('joinRoomBtn').onclick = () => document.getElementById('joinSection').classList.toggle('hidden');
  document.getElementById('confirmJoinBtn').onclick = joinRoom;
  document.getElementById('readyBtn').onclick = () => room.send("ready");
  document.getElementById('sendChatBtn').onclick = () => {
    const msg = document.getElementById('chatInput').value.trim();
    if (msg) { room.send("chat", msg); document.getElementById('chatInput').value = ''; }
  };
  document.getElementById('leaveLobbyBtn').onclick = leaveRoom;
  document.getElementById('leaveGameBtn').onclick = leaveRoom;

  function leaveRoom() {
    if (room) room.leave();
    room = null; gameActive = false;
    if (inputInterval) clearInterval(inputInterval);
    if (pingInterval) clearInterval(pingInterval);
    panels.game.classList.add('hidden'); panels.lobby.classList.add('hidden'); panels.menu.classList.remove('hidden');
    winnerMsgDiv.style.display = 'none'; warningDiv.style.display = 'none';
    countdownEl.style.display = 'none'; statusBar.innerText = '⚪ WAITING';
    reconnectOverlay.style.display = 'none'; rematchBtn.classList.add('hidden');
    passwordDisplay.style.display = 'none'; mobileControls.style.display = 'none';
    predictedX = predictedY = predictedVx = predictedVy = undefined;
    lastInputStr = null; serverState = null; localPlayer = null; remotePlayer = null;
  }

  // Initialize mobile controls
  if (isMobile()) { setupDpad(); setupActionButtons(); }
</script>

</body></html>
