body { margin:0; background:#050110; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Segoe UI', Arial, sans-serif;}

.controls { position:absolute; bottom:20px; display:flex; gap:10px; flex-wrap:wrap;}
button, select { background:#111; border:2px solid #00f2ff; color:#00f2ff; padding:8px 15px; cursor:pointer; font-weight:bold; text-transform:uppercase;}
button.active { background:#ff00ff; border-color:white; color:white;}

<script>
    function goToPage(page){
    window.location.href = page;
}
let gameStarted = false; // will start after pressing Start
const canvas=document.getElementById("fbCanvas");
const ctx=canvas.getContext("2d");

let aiMode=true,p1Score=0,p2Score=0,gameOver=false,goalFlash=0;
let totalTime=0,timeLeft=0,gameType=10,aiLevel=3;
const keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

function postCommentary(msg,color="#ffcc00"){
    const comm=document.getElementById('commentary');
    comm.innerText=msg;
    comm.style.color=color;
    comm.classList.add('show');
    setTimeout(()=>comm.classList.remove('show'),2000);
}

// ===================== START PAGE LOGIC =====================
const startBtn = document.createElement('button');
startBtn.innerText = "START GAME";
startBtn.style.cssText = "font-size:40px;padding:20px 50px;background:#111;color:#00ff00;border:2px solid #00ff00;border-radius:10px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:500;";
document.body.appendChild(startBtn);

const bgMusic = document.getElementById('bgMusic');
const playlist = ['1.mp3','3.mp3','4.mp3','5.MP3','6.mp3'];
let currentTrack = 0;
bgMusic.volume = 1.0;

startBtn.addEventListener('click', ()=>{
    gameStarted = true;
    startBtn.style.display = 'none';
    playNextTrack();
    // ADDED: Auto fullscreen + auto rotate on game start
    requestFullscreenAndRotate();
});

function playNextTrack(){
    bgMusic.src = playlist[currentTrack];
    bgMusic.play().catch(()=>{});
    currentTrack++;
    if(currentTrack >= playlist.length) currentTrack = 0;
    bgMusic.onended = playNextTrack;
}

// ===================== ADDED: FULLSCREEN + AUTO ROTATE =====================
function requestFullscreenAndRotate() {
    const el = document.documentElement;
    if (el.requestFullscreen) {
        el.requestFullscreen().then(() => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }).catch(() => {});
    } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
        if (screen.lockOrientation) screen.lockOrientation('landscape');
    }
}
function exitFullscreen() {
    if (document.exitFullscreen) {
        document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
    }
    if (screen.orientation && screen.orientation.unlock) {
        screen.orientation.unlock();
    }
}
document.getElementById('fullscreenToggle').addEventListener('click', () => {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        exitFullscreen();
    } else {
        requestFullscreenAndRotate();
    }
});

// ===================== BALL, PLAYERS, KEEPERS =====================
class Ball{
    constructor(){ this.reset(); }
    reset(){ this.x=500; this.y=250; this.vx=(Math.random()>0.5?5:-5); this.vy=-3; }
    update(k1,k2,players){
        if(gameOver) return;
        this.x+=this.vx; this.y+=this.vy; this.vy+=0.25; this.vx*=0.995;
        if(this.y>480){this.y=480; this.vy*=-0.7;}
        if(this.y<10){this.y=10; this.vy*=-0.7;}

        [k1,k2].forEach(k=>{
            if(this.x+10>k.x && this.x-10<k.x+12 && this.y+10>k.y && this.y-10<k.y+60){
                if(Math.abs(this.vx)>25) postCommentary("WHAT A SAVE!","#fff");
                this.vx*=-1.1; this.x=(k.x<500)?25:970;
            }
        });

        players.forEach(p=>{
            if(this.x+10>p.x && this.x-10<p.x+30 && this.y+10>p.y && this.y-10<p.y+65){
                this.vx*=-0.5; this.x=(this.x<p.x+15)?p.x-11:p.x+31;
            }
        });

        if(this.x<0 || this.x>1000) this.checkGoal();
    }

    checkGoal(){
        if(this.y>150 && this.y<350){
            if(this.x<0) p2Score++; else p1Score++;
            goalFlash=25;
            showGoalBanner(this.x<0?"#00f2ff":"#ff00ff");
            flashLastGoalLight();
 const horn = document.getElementById('goalHorn');
horn.pause();
horn.currentTime = 0;
horn.play().catch(()=>{});
            if(p1Score>=gameType || p2Score>=gameType){
                gameOver=true;
                document.getElementById('winnerMsg').innerText=(p1Score>=gameType && aiMode)?"AI Wins!":"Human Wins!";
                document.getElementById('winnerMsg').style.display="block";
            }

            this.reset();
        } else { this.vx*=-1; this.x=this.x<0?5:995; }
    }
}

function showGoalBanner(color){
    const el=document.getElementById('goalBanner');
    el.style.textShadow=`0 0 30px ${color},0 0 60px ${color}`;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1500);
}
function flashLastGoalLight(){
    const light=document.getElementById('lastGoalLight');
    light.style.display='block';
    setTimeout(()=>light.style.display='none',1500);
}

class Keeper{
    constructor(x,skill=1){ this.x=x; this.y=250; this.vy=0; this.skill=skill; }
    update(ball){
        let targetY=ball.y-30;
        let delta=(targetY-this.y)*0.1*this.skill;
        this.vy+=delta; this.vy*=0.7; this.y+=this.vy;
        if(this.y<155) this.y=155;
        if(this.y>295) this.y=295;
    }
}

class Player{
    constructor(x,y,color,controls,side){
        this.x=x; this.y=y; this.color=color; this.controls=controls; this.side=side;
        this.vx=0; this.vy=0; this.isJumping=false;
    }
    update(ball,isAI){
        let dx=(this.x+15)-ball.x;
        let dy=(this.y+32)-ball.y;
        let hasBall=(dx*dx+dy*dy)<2500;
        let isTurbo=(this.side==='left')?(keys['KeyW']):(keys['ArrowUp']&&(keys['ArrowLeft']||keys['ArrowRight']));
        let attemptingShot=(this.side==='left')?keys['Key1']:(keys['ArrowUp']);

        // ADDED: Touch input for human player
        const touch = getTouchInput();
        const leftTouch = touch.left;
        const rightTouch = touch.right;
        const upTouch = touch.up;
        const downTouch = touch.down;
        const shootTouch = touch.shoot;
        const turboTouch = touch.turbo;
        const lockTouch = touch.lock;

        // ADDED: Override keyboard with touch
        const left = keys[this.controls.left] || leftTouch;
        const right = keys[this.controls.right] || rightTouch;
        const up = keys[this.controls.up] || upTouch;
        const down = keys[this.controls.down] || downTouch;
        const shoot = (this.side==='left' ? (keys['Key1'] || shootTouch) : (keys['ArrowUp'] || shootTouch));
        const turbo = (this.side==='left' ? (keys['KeyW'] || turboTouch) : ((keys['ArrowUp']&&(keys['ArrowLeft']||keys['ArrowRight'])) || turboTouch));

        if(isAI){
            let distX = ball.x - (this.x + 15);
            let distY = ball.y - (this.y + 32);
            let hasBall = (distX*distX + distY*distY) < 2500;

            // ---- SMART POSITIONING ----
            let targetX = (this.side === 'left') ? Math.min(ball.x - 50, 300) : Math.max(ball.x + 50, 700);
            let targetY = ball.y - 30;

            // Move smoothly toward targetX
            if(this.x < targetX) this.vx += 1.2 * aiLevel/3;
            if(this.x > targetX) this.vx -= 1.2 * aiLevel/3;

            // Jump if ball is above AI
            if(!hasBall && distY < -15 && !this.isJumping && this.y >= 415) {
                this.vy = -14 * aiLevel/3;
                this.isJumping = true;
            }

            // ---- SHOT DECISION ----
            if(hasBall){
                this.vx = 0;

                // Determine shot speed based on AI level
                let speed = 20 + (aiLevel*10);
                let predictedY = ball.y + ball.vy * 10; // simple trajectory prediction
                let goalY = 250; // goal center
                let shootPower = Math.min(50, Math.abs(predictedY - goalY) * 2);

                ball.vx = (this.side==='left') ? speed : -speed;
                ball.vy = -shootPower;

                // Post commentary
                if(aiLevel >= 3) postCommentary("AI POWER SHOT!", this.color);
                else postCommentary("AI SHOT!", this.color);
            }

            // ---- HESITATION FOR LOWER LEVELS ----
            if(aiLevel < 3 && Math.random() > 0.8) this.vx *= 0.5;
        } else {
            // ---- HUMAN PLAYER (with touch + keyboard) ----
            if(hasBall && (shoot || turbo)){
                this.vx=0;
                let speed=turbo?45:20;
                ball.vx=(this.side==='left')?speed:-speed;
                if(turbo) postCommentary("TURBO SHOT!",this.color); else postCommentary("POWER SHOT!","#fff");

                // ADDED: Lock-on or joystick aiming for shot
                if(lockTouch || keys['ShiftLeft'] || keys['ShiftRight']) {
                    // Lock-on: aim directly at goal center with slight randomness
                    ball.vy = -8 + (Math.random() * 4 - 2);
                } else if (currentAimAngle !== null) {
                    const angleRad = currentAimAngle * Math.PI / 180;
                    ball.vy = -12 * Math.sin(angleRad);
                } else {
                    if(this.side==='left'){ if(keys['KeyW']&&!keys['KeyS']) ball.vy=-14; else if(keys['KeyS']) ball.vy=10; else ball.vy=-2; }
                    else { if(keys['ArrowUp']&&!keys['ArrowDown']) ball.vy=-14; else if(keys['ArrowDown']) ball.vy=10; else ball.vy=-2; }
                }
            } else {
                // Movement (keyboard + touch)
                if(left) this.vx-=1.1;
                if(right) this.vx+=1.1;
                if(up && !this.isJumping && this.y >= 415){
                    this.vy=-14; this.isJumping=true;
                }
                if(down) this.vy+=1;
            }
        }
        this.vy+=0.7; this.x+=this.vx; this.y+=this.vy; this.vx*=0.85;
        if(this.y>415){ this.y=415; this.vy=0; this.isJumping=false;}
        if(this.x<40) this.x=40; if(this.x>930) this.x=930;
    }
}

// ===================== ADDED: TOUCH STATE =====================
let touchDir = { up: false, down: false, left: false, right: false };
let shootPressed = false;
let turboPressed = false;
let lockPressed = false;
let joystickActive = false;
let joystickCenter = { x: 0, y: 0 };
let joystickMaxDist = 35;
let currentAimAngle = null;

function getTouchInput() {
    return {
        left: touchDir.left,
        right: touchDir.right,
        up: touchDir.up,
        down: touchDir.down,
        shoot: shootPressed,
        turbo: turboPressed,
        lock: lockPressed
    };
}

// ===================== ADDED: JOYSTICK SETUP =====================
function setupJoystick() {
    const base = document.getElementById('joystickBase');
    const thumb = document.getElementById('joystickThumb');

    function updateAimAngle(dx, dy) {
        if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
            currentAimAngle = null;
            return;
        }
        currentAimAngle = Math.atan2(-dy, dx) * 180 / Math.PI;
    }

    function updateThumb(e) {
        const touch = e.touches[0];
        if (!touch) return;
        let dx = touch.clientX - joystickCenter.x;
        let dy = touch.clientY - joystickCenter.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const max = joystickMaxDist;
        let clampedDist = Math.min(dist, max);
        let normalizedDx = 0, normalizedDy = 0;
        if (dist > 0) {
            normalizedDx = dx / dist;
            normalizedDy = dy / dist;
            dx = normalizedDx * clampedDist;
            dy = normalizedDy * clampedDist;
        }
        thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

        touchDir.left = normalizedDx < -0.3;
        touchDir.right = normalizedDx > 0.3;
        touchDir.up = normalizedDy < -0.3;
        touchDir.down = normalizedDy > 0.3;

        updateAimAngle(normalizedDx, normalizedDy);
    }

    function handleStart(e) {
        e.preventDefault();
        joystickActive = true;
        const rect = base.getBoundingClientRect();
        joystickCenter.x = rect.left + rect.width/2;
        joystickCenter.y = rect.top + rect.height/2;
        updateThumb(e);
    }

    function handleMove(e) {
        if (!joystickActive) return;
        e.preventDefault();
        updateThumb(e);
    }

    function handleEnd(e) {
        e.preventDefault();
        joystickActive = false;
        thumb.style.transform = `translate(-50%, -50%)`;
        touchDir = { up: false, down: false, left: false, right: false };
        currentAimAngle = null;
    }

    base.addEventListener('touchstart', handleStart, { passive: false });
    base.addEventListener('touchmove', handleMove, { passive: false });
    base.addEventListener('touchend', handleEnd);
    base.addEventListener('touchcancel', handleEnd);
}

// ===================== ADDED: DIAMOND BUTTONS =====================
function setupActionButtons() {
    const shootBtn = document.getElementById('shootBtn');
    const dashBtn = document.getElementById('dashBtn');
    const turboBtn = document.getElementById('turboShotBtn');
    const lockBtn = document.getElementById('lockBtnMobile');

    shootBtn.addEventListener('touchstart', e => { e.preventDefault(); shootPressed = true; });
    shootBtn.addEventListener('touchend', e => { e.preventDefault(); shootPressed = false; });

    dashBtn.addEventListener('touchstart', e => { e.preventDefault(); turboPressed = true; });
    dashBtn.addEventListener('touchend', e => { e.preventDefault(); turboPressed = false; });

    turboBtn.addEventListener('touchstart', e => { e.preventDefault(); shootPressed = true; turboPressed = true; });
    turboBtn.addEventListener('touchend', e => { e.preventDefault(); shootPressed = false; turboPressed = false; });

    lockBtn.addEventListener('touchstart', e => { e.preventDefault(); lockPressed = true; });
    lockBtn.addEventListener('touchend', e => { e.preventDefault(); lockPressed = false; });
}

// ===================== ADDED: SHOW MOBILE CONTROLS =====================
function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }
function showMobileControls() {
    if (isMobile()) {
        document.getElementById('mobileControls').style.display = 'flex';
    }
}

// ===================== DRAW SCENE (with aim indicator) =====================
let prevBallX = 500, prevBallY = 250;

function drawScene(){
    ctx.clearRect(0,0,1000,500);
    ctx.strokeStyle="rgba(255,255,255,0.1)";
    ctx.strokeRect(0,150,40,200);
    ctx.strokeRect(960,150,40,200);
    ctx.beginPath(); ctx.moveTo(500,0); ctx.lineTo(500,500); ctx.stroke();
    if(goalFlash>0){ ctx.fillStyle=`rgba(255,255,255,${goalFlash/10})`; ctx.fillRect(0,0,1000,500); goalFlash--; }

    // Ball with interpolation
    prevBallX += (ball.x - prevBallX) * 0.4;
    prevBallY += (ball.y - prevBallY) * 0.4;
    let renderX = prevBallX, renderY = prevBallY;
    if (renderX < 10) renderX = 10; if (renderX > 990) renderX = 990;
    if (renderY < 10) renderY = 10; if (renderY > 490) renderY = 490;

    ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(renderX, renderY, 10, 0, Math.PI*2); ctx.fill();

    // ADDED: Lock-on aiming line
    if ((lockPressed || keys['ShiftLeft'] || keys['ShiftRight']) && gameStarted && !gameOver) {
        ctx.strokeStyle = "rgba(0, 255, 255, 0.5)";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(p1.x + 15, p1.y + 30);
        ctx.lineTo(renderX, renderY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.lineWidth = 1;
    }

    // ADDED: Joystick aim indicator
    if (currentAimAngle !== null && gameStarted && !gameOver) {
        const angleRad = currentAimAngle * Math.PI / 180;
        const indX = p1.x + 15 + 60 * Math.cos(angleRad);
        const indY = p1.y + 30 + 60 * Math.sin(angleRad);
        const aimEl = document.getElementById('aimIndicator');
        aimEl.style.display = 'block';
        aimEl.style.left = indX + 'px';
        aimEl.style.top = indY + 'px';
    } else {
        document.getElementById('aimIndicator').style.display = 'none';
    }

    ctx.fillStyle=p1.color; ctx.fillRect(p1.x,p1.y,30,65);
    ctx.fillStyle=p2.color; ctx.fillRect(p2.x,p2.y,30,65);
    ctx.fillStyle="#ff00ff"; ctx.fillRect(5,k1.y,12,60);
    ctx.fillStyle="#00f2ff"; ctx.fillRect(983,k2.y,12,60);
}

let lastTime=0;
function loop(){
    if(!gameStarted){ requestAnimationFrame(loop); return; }
    if(!gameOver){
        ball.update(k1,k2,[p1,p2]);
        k1.update(ball); k2.update(ball);
        p1.update(ball,aiMode); p2.update(ball,false);
        if(totalTime>0){ timeLeft-=1/60; if(timeLeft<=2*60) document.getElementById('warning').style.display='block';
        if(timeLeft<=0){ gameOver=true; document.getElementById('winnerMsg').innerText=(p1Score>p2Score)?"Human Wins!":"AI Wins!"; document.getElementById('winnerMsg').style.display="block"; } }
    }
    drawScene();
    document.getElementById('p1Score').innerText=p1Score;
    document.getElementById('p2Score').innerText=p2Score;
    requestAnimationFrame(loop);
}

function resetMatch(){
    p1Score=0; p2Score=0; gameOver=false; ball.reset();
    k1=new Keeper(5,1.2); k2=new Keeper(983,1);
    p1=new Player(150,415,"#ff00ff",{up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD'},'left');
    p2=new Player(820,415,"#00f2ff",{up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'},'right');
    document.getElementById('warning').style.display='none';
    document.getElementById('winnerMsg').style.display='none';
    document.getElementById('lastGoalLight').style.display='none';
}

// ===================== INIT =====================
// ADDED: Initialise touch controls
showMobileControls();
setupJoystick();
setupActionButtons();

loop();
</script>
