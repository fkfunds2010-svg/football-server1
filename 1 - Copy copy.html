<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<title>Franklin Football 2026:FK GAME</title>
<style>
body { margin:0; background:#050110; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Segoe UI', Arial, sans-serif;}
.scoreboard { position:absolute; top:20px; font-size:45px; font-weight:bold; color:white; display:flex; gap:40px; text-shadow:0 0 15px #00f2ff; z-index:10;}
canvas { background: radial-gradient(circle,#1a2b1a 0%,#051005 100%); border:4px solid #00ff00; border-radius:10px; transition:border-color 0.1s;}
#goalBanner { position:absolute; top:40%; left:50%; transform:translate(-50%, -50%) scale(0); font-size:100px; font-weight:900; color:#fff; text-shadow:0 0 30px #00ff00; z-index:100; pointer-events:none; transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); font-style:italic;}
#goalBanner.show { transform:translate(-50%, -50%) scale(1);}
#commentary { position:absolute; top:70%; left:50%; transform:translateX(-50%); font-size:28px; font-weight:bold; color:#ffcc00; text-shadow:0 0 10px #000; z-index:90; opacity:0; transition:opacity 0.3s; text-transform:uppercase; letter-spacing:2px;}
#commentary.show { opacity:1;}
.match-banner { position:absolute; top:85px; font-size:20px; font-weight:bold; color:#fff; text-shadow:0 0 10px #ff0000; display:none; text-transform:uppercase; animation:pulse 1s infinite;}
@keyframes pulse {0%,100%{opacity:0.3;}50%{opacity:1;}}
.match-point { animation:flicker 0.3s infinite;}
@keyframes flicker {0%,100%{border-color:#00ff00;}50%{border-color:#ffffff;box-shadow:0 0 40px #ffffff;}}
.controls { position:absolute; bottom:20px; display:flex; gap:10px; flex-wrap:wrap;}
button, select { background:#111; border:2px solid #00f2ff; color:#00f2ff; padding:8px 15px; cursor:pointer; font-weight:bold; text-transform:uppercase;}
button.active { background:#ff00ff; border-color:white; color:white;}

#warning { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:50px; font-weight:bold; color:#ff0000; text-shadow:0 0 20px #fff; display:none; z-index:200;}
#winnerMsg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:60px; font-weight:bold; color:#00ff00; text-shadow:0 0 30px #fff; display:none; z-index:300;}
#lastGoalLight { position:absolute; top:10px; right:50px; width:30px; height:30px; border-radius:50%; background:#ff0000; box-shadow:0 0 15px #ff0000; display:none; z-index:400;}
/* Pre-Game Start Button Page */
#startPage {
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    display:flex; justify-content:center; align-items:center; flex-direction:column;
    background:#050110; z-index:500;
}
#startPage h1 { color:#fff; font-size:60px; text-shadow:0 0 20px #00ff00; margin-bottom:30px;}
#startPage button { font-size:30px; padding:20px 40px; border:2px solid #00ff00; background:#111; color:#00ff00; border-radius:10px; cursor:pointer;}
#startPage button:hover { background:#00ff00; color:#111; }
</style>
</head>
<body>
<div id="startPage">
  <h1>Franklin Football 2026</h1>
  <button id="startBtn">START GAME</button>
</div>
<div class="scoreboard">
<span id="p1Score" style="color:#ff00ff">0</span>
<span style="color:white;opacity:0.5">|</span>
<span id="p2Score" style="color:#00f2ff">0</span>
</div>
<div id="matchBanner" class="match-banner">MATCH POINT!</div>
<div id="goalBanner">GOAL!</div>
<div id="commentary">GREAT SHOT!</div>
<div id="warning">2 MINUTES LEFT!</div>
<div id="winnerMsg"></div>
<div id="lastGoalLight"></div>

<!-- Goal Horn -->
<audio id="goalHorn" src="9.mp3"></audio>

<!-- Background Music -->
<audio id="bgMusic"></audio>
<canvas id="fbCanvas" width="1000" height="500"></canvas>

<div class="controls">
    <button id="laptopPVPBtn">Laptop PvP</button>
<button id="pvp" onclick="setMode('pvp')">Human vs Human</button>
<button id="pve" class="active" onclick="setMode('ai')">AI (Left) vs YOU (Right)</button>

<select id="timeSelect" onchange="setGameTime(this.value)">
<option value="" selected="selected">Select Time (min)</option>
<option value="2">2</option>
<option value="4">4</option>
<option value="6">6</option>
<option value="8">8</option>
<option value="10">10</option>
<option value="12">12</option>
<option value="14">14</option>
<option value="16">16</option>
<option value="18">18</option>
<option value="20">20</option>
</select>

<select id="goalSelect" onchange="setGameGoal(this.value)">
<option value="" selected="selected">First X Goals</option>
<option value="10">1st 10</option>
<option value="20">1st 20</option>
<option value="30">1st 30</option>
</select>

<select id="AI DIFFICULTY LEVELS" onchange="setAIHardness(this.value)">
<option value="1">AI Easy</option>
<option value="2">AI Medium</option>
<option value="3" selected="selected">AI Hard</option>
<option value="4">AI Impossible</option>
</select>

<button onclick="resetMatch()" style="border-color:white;color:white;">Restart</button>
</div>

<script>
    let gameStarted = false;

document.getElementById('startBtn').addEventListener('click', () => {
    gameStarted = true; // allow game loop to run
    document.getElementById('startPage').style.display = 'none';

    // Start background music after click
    const bg = document.getElementById("bgMusic");
    bg.volume = 1;
    bg.play().catch(()=>{});
});document.getElementById('laptopPVPBtn').addEventListener('click', () => {
    const password = prompt("Enter password for Laptop PvP mode:");
    if(password === "LAPTOPPVP"){ // You can change this password
        aiMode = false; // Turn off AI

        // Reset players with both using arrow keys
        p1 = new Player(150, 415, "#ff00ff", {up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight'}, 'left');
        p2 = new Player(820, 415, "#00f2ff", {up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight'}, 'right');

        // Override update for turbo = only ArrowUp, powershot triggers normally
        p1.update = function(ball, isAI){ laptopPVPUpdate(this, ball); }
        p2.update = function(ball, isAI){ laptopPVPUpdate(this, ball); }

        alert("Laptop PvP Mode Activated! Both players use Arrow keys and turbo is Arrow Up.");
        resetMatch();
    } else {
        alert("Incorrect password!");
    }
});

// Update function for Laptop PvP mode
function laptopPVPUpdate(player, ball){
    const dx = (player.x + 15) - ball.x;
    const dy = (player.y + 32) - ball.y;
    const hasBall = (dx*dx + dy*dy) < 2500;

    const attemptingShot = keys[player.controls.up]; // Arrow Up only triggers turbo/powershot

    // Shoot / turbo if player has the ball
    if(hasBall && attemptingShot){
        player.vx = 0;
        ball.vx = (player.side==='left') ? 20 : -20;
        ball.vy = -14; // normal vertical shot
        postCommentary("TURBO SHOT!", player.color);
    } else {
        // Movement
        if(keys[player.controls.left]) player.vx -= 1.1;
        if(keys[player.controls.right]) player.vx += 1.1;
        if(keys[player.controls.up] && !player.isJumping) player.vy = -14, player.isJumping = true;
        if(keys[player.controls.down]) player.vy += 1;
    }

    // Apply gravity and friction
    player.vy += 0.7;
    player.x += player.vx;
    player.y += player.vy;
    player.vx *= 0.85;
    if(player.y > 415){ player.y = 415; player.vy = 0; player.isJumping = false; }
    if(player.x < 40) player.x = 40;
    if(player.x > 930) player.x = 930;
}
const canvas=document.getElementById("fbCanvas");
const ctx=canvas.getContext("2d");
let aiMode=true,p1Score=0,p2Score=0,gameOver=false,goalFlash=0;
let totalTime=0,timeLeft=0,gameType=10,aiLevel=3;
const keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

function postCommentary(msg,color="#ffcc00"){
    const comm=document.getElementById('commentary');
    comm.innerText=msg;
    comm.style.color=color;
    comm.classList.add('show');
    setTimeout(()=>comm.classList.remove('show'),2000);
}

// Ball
class Ball{
    constructor(){ this.reset(); }
    reset(){ this.x=500; this.y=250; this.vx=(Math.random()>0.5?5:-5); this.vy=-3; }
    update(k1,k2,players){
        if(gameOver) return;
        this.x+=this.vx; this.y+=this.vy; this.vy+=0.25; this.vx*=0.995;
        if(this.y>480){this.y=480; this.vy*=-0.7;}
        if(this.y<10){this.y=10; this.vy*=-0.7;}

        [k1,k2].forEach(k=>{
            if(this.x+10>k.x && this.x-10<k.x+12 && this.y+10>k.y && this.y-10<k.y+60){
                if(Math.abs(this.vx)>25) postCommentary("WHAT A SAVE!","#fff");
                this.vx*=-1.1; this.x=(k.x<500)?25:970;
            }
        });

        players.forEach(p=>{
            if(this.x+10>p.x && this.x-10<p.x+30 && this.y+10>p.y && this.y-10<p.y+65){
                this.vx*=-0.5; this.x=(this.x<p.x+15)?p.x-11:p.x+31;
            }
        });

        if(this.x<0 || this.x>1000) this.checkGoal();
    }

    checkGoal(){
        if(this.y>150 && this.y<350){
            if(this.x<0) p2Score++; else p1Score++;
            goalFlash=25;
            showGoalBanner(this.x<0?"#00f2ff":"#ff00ff");
            flashLastGoalLight();
 const horn = document.getElementById('goalHorn');
horn.pause();
horn.currentTime = 0;
horn.play().catch(()=>{});
            if(p1Score>=gameType || p2Score>=gameType){
                gameOver=true;
                document.getElementById('winnerMsg').innerText=(p1Score>=gameType && aiMode)?"AI Wins!":"Human Wins!";
                document.getElementById('winnerMsg').style.display="block";
            }

            this.reset();
        } else { this.vx*=-1; this.x=this.x<0?5:995; }
    }
}

function showGoalBanner(color){
    const el=document.getElementById('goalBanner');
    el.style.textShadow=`0 0 30px ${color},0 0 60px ${color}`;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1500);
}

function flashLastGoalLight(){
    const light=document.getElementById('lastGoalLight');
    light.style.display='block';
    setTimeout(()=>light.style.display='none',1500);
}

// Keeper
class Keeper{
    constructor(x,skill=1){ this.x=x; this.y=250; this.vy=0; this.skill=skill; }
    update(ball){
        let targetY=ball.y-30;
        let delta=(targetY-this.y)*0.1*this.skill;
        this.vy+=delta; this.vy*=0.7; this.y+=this.vy;
        if(this.y<155) this.y=155;
        if(this.y>295) this.y=295;
    }
}

// Player
class Player{
    constructor(x,y,color,controls,side){
        this.x=x; this.y=y; this.color=color; this.controls=controls; this.side=side;
        this.vx=0; this.vy=0; this.isJumping=false;
    }
    update(ball,isAI){
       let dx=(this.x+15)-ball.x;
let dy=(this.y+32)-ball.y;
let hasBall=(dx*dx+dy*dy)<2500;
        let isTurbo=(this.side==='left')?(keys['KeyW']):(keys['ArrowUp']&&(keys['ArrowLeft']||keys['ArrowRight']));
        let attemptingShot=(this.side==='left')?keys['Key1']:(keys['ArrowUp']);

      
if(isAI){
    let distX = ball.x - (this.x + 15);
    let distY = ball.y - (this.y + 32);
    

    // Horizontal movement toward the ball
    if(distX < -5) this.vx -= 1.1 * aiLevel/3; 
    else if(distX > 5) this.vx += 1.1 * aiLevel/3;

    // Vertical movement: only jump if on ground AND below the ball, AND does not have the ball
    if(!hasBall){
        if(distY < -10 && !this.isJumping && this.y >= 415){ 
            this.vy = -14; // same jump height as human
            this.isJumping = true;
        }
        // Gravity/coming back down handled naturally in main update
    }

    // Shooting logic: only if AI has the ball
    if(hasBall){
        this.vx = 0; // stop horizontal
        let speed = (aiLevel>=3) ?45 : 20;
        ball.vx = (this.side==='left') ? speed : -speed;
        ball.vy = -200; // normal shot
        postCommentary("AI POWER SHOT!", this.color);
    }
}

        if(hasBall && (attemptingShot || isTurbo)){
            this.vx=0;
            let speed=isTurbo?45:20;
            ball.vx=(this.side==='left')?speed:-speed;
            if(isTurbo) postCommentary("TURBO SHOT!",this.color);
            else postCommentary("POWER SHOT!","#fff");

            if(this.side==='left'){
                if(keys['KeyW'] && !keys['KeyS']) ball.vy=-14;
                else if(keys['KeyS']) ball.vy=10;
                else ball.vy=-2;
            } else {
                if(keys['ArrowUp'] && !keys['ArrowDown']) ball.vy=-14;
                else if(keys['ArrowDown']) ball.vy=10;
                else ball.vy=-2;
            }
        } else {
            if(!isAI){
                if(keys[this.controls.left]) this.vx-=1.1;
                if(keys[this.controls.right]) this.vx+=1.1;
                if(keys[this.controls.up]&&!this.isJumping){this.vy=-14; this.isJumping=true;}
                if(keys[this.controls.down]) this.vy+=1;
            }
        }

        this.vy+=0.7; this.x+=this.vx; this.y+=this.vy; this.vx*=0.85;
        if(this.y>415){this.y=415; this.vy=0; this.isJumping=false;}
        if(this.x<40) this.x=40;
        if(this.x>930) this.x=930;
    }
}

let ball=new Ball();
let k1=new Keeper(5,1.2);
let k2=new Keeper(983,1);
let p1=new Player(150,415,"#ff00ff",{up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD'},'left');
let p2=new Player(820,415,"#00f2ff",{up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'},'right');

function setMode(m){ aiMode=(m==='ai'); resetMatch(); }
function setGameTime(min){ totalTime=parseInt(min)||0; timeLeft=totalTime*60; resetMatch(); }
function setGameGoal(goal){ gameType=parseInt(goal)||10; resetMatch(); }
function setAIHardness(level){ aiLevel=parseInt(level)||3; }

function drawScene(){
    ctx.clearRect(0,0,1000,500);

    // Normal pitch lines (original style)
    ctx.strokeStyle="rgba(255,255,255,0.1)";
    ctx.strokeRect(0,150,40,200);
    ctx.strokeRect(960,150,40,200);
    ctx.beginPath(); ctx.moveTo(500,0); ctx.lineTo(500,500); ctx.stroke();

    if(goalFlash>0){ ctx.fillStyle=`rgba(255,255,255,${goalFlash/10})`; ctx.fillRect(0,0,1000,500); goalFlash--; }

    ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(ball.x,ball.y,10,0,Math.PI*2); ctx.fill();

    ctx.fillStyle=p1.color; ctx.fillRect(p1.x,p1.y,30,65);
    ctx.fillStyle=p2.color; ctx.fillRect(p2.x,p2.y,30,65);
    ctx.fillStyle="#ff00ff"; ctx.fillRect(5,k1.y,12,60);
    ctx.fillStyle="#00f2ff"; ctx.fillRect(983,k2.y,12,60);
}
let lastTime = 0;
function loop(currentTime){
    if(!gameStarted){ 
        requestAnimationFrame(loop); 
        return; 
    }
    if(!gameOver){
        ball.update(k1,k2,[p1,p2]);
        k1.update(ball); k2.update(ball);
        p1.update(ball,aiMode); p2.update(ball,false);
        

        if(totalTime>0){
            timeLeft-=1/60;
            if(timeLeft<=2*60) document.getElementById('warning').style.display='block';
            if(timeLeft<=0){ gameOver=true; document.getElementById('winnerMsg').innerText=(p1Score>p2Score)?"Human Wins!":"AI Wins!"; document.getElementById('winnerMsg').style.display="block"; }
        }
    }

    drawScene();
   let lastP1=-1,lastP2=-1;

if(p1Score!==lastP1){
    document.getElementById('p1Score').innerText=p1Score;
    lastP1=p1Score;
}
if(p2Score!==lastP2){
    document.getElementById('p2Score').innerText=p2Score;
    lastP2=p2Score;
}

    requestAnimationFrame(loop);
}

function resetMatch(){
    p1Score=0; p2Score=0; gameOver=false; ball.reset();
    k1=new Keeper(5,1.2); k2=new Keeper(983,1);
    p1=new Player(150,415,"#ff00ff",{up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD'},'left');
    p2=new Player(820,415,"#00f2ff",{up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'},'right');
    document.getElementById('warning').style.display='none';
    document.getElementById('winnerMsg').style.display='none';
    document.getElementById('lastGoalLight').style.display='none';
}
document.addEventListener("click", () => {
    const bg = document.getElementById("bgMusic");
    bg.volume = 1;
    bg.play().catch(()=>{}); // plays music after first click

    const horn = document.getElementById("goalHorn");
    horn.load(); // preload horn
}, { once: true });
const bgMusic = document.getElementById('bgMusic');

// List of songs
const playlist = [
    
    '1.mp3',
    '3.mp3',
    '4.mp3',
    '5.MP3',
    '6.mp3'
];

let currentTrack = 0;

// Set volume to max
bgMusic.volume = 1.0; // 1.0 is 100%
function playNextTrack() {
    bgMusic.src = playlist[currentTrack];
    bgMusic.play().catch(()=>{}); // autoplay may require user interaction
    currentTrack++;
    if(currentTrack >= playlist.length) currentTrack = 0; // loop playlist
}

// When one track ends, play the next
bgMusic.addEventListener('ended', playNextTrack);

// Start the first track after user clicks anywhere (required by browser autoplay rules)
document.addEventListener('click', () => {
    playNextTrack();
}, { once: true });

loop();
</script>



 </body></html>
